{% extends 'login/base.html' %}
{% load static %}
{% block head_login %}
    <script src="{% static 'lib/formvalidation-1.9.0/js/plugins/PasswordStrength.min.js' %}"></script>
    <script src="{% static 'lib/formvalidation-1.9.0/js/zxcvbn.js' %}"></script>
    <script src="{% static 'login/js/update_password.js' %}"></script>
{% endblock %}

{% block content %}
<div class="fb-login-wrapper">
    <div class="fb-login-box">
        <div class="contact-image text-center mb-4">
            <div class="fb-login-icon">
                <i class="{{ dashboard.get_icon }} fa-3x"></i>
            </div>
        </div>

        <h2 class="text-center font-bold text-gray-800 text-xl mb-1">Nueva Contraseña</h2>
        <p class="text-center text-gray-400 text-sm mb-5 login-box-msg">Reseteo de Password</p>

        <form method="post" id="frmForm" data-url="{{ list_url }}" autocomplete="off">
            {% csrf_token %}

            <div class="form-group mb-4">
                <label class="fb-label" for="password">{{ form.password.label }}</label>
                <div class="input-group my-group fb-input-wrapper-group">
                    {{ form.password }}
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary btnShowPassword" type="button">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="form-group mb-5">
                <label class="fb-label" for="confirm_password">{{ form.confirm_password.label }}</label>
                <div class="input-group my-group fb-input-wrapper-group">
                    {{ form.confirm_password }}
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary btnShowPassword" type="button">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="progress password-progress mt-2" style="height: 6px;">
                    <div id="strengthBar" class="progress-bar rounded-full" role="progressbar" style="width: 0;"></div>
                </div>
            </div>

            <button id="btnLogin" class="btn btn-primary btn-block w-full py-2.5 font-semibold" type="submit">
                <i class="fas fa-lock mr-2"></i> Cambiar Contraseña
            </button>
        </form>

        <p class="text-center text-sm mt-4 text-gray-400 login-box-msg desc">
            ¿Deseas retornar?
            <a href="{{ list_url }}" class="text-indigo-600 font-medium hover:underline">click aquí</a>
        </p>
    </div>
</div>
{% endblock %}
