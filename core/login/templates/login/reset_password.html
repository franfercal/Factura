{% extends 'login/base.html' %}
{% load static %}
{% block head_login %}
    <script src="{% static 'login/js/reset_password.js' %}"></script>
{% endblock %}

{% block content %}
<div class="fb-login-wrapper">
    <div class="fb-login-box">
        <div class="contact-image text-center mb-4">
            <div class="fb-login-icon">
                <i class="{{ dashboard.get_icon }} fa-3x"></i>
            </div>
        </div>

        <h2 class="text-center font-bold text-gray-800 text-xl mb-1">Recuperar Contraseña</h2>
        <p class="text-center text-gray-400 text-sm mb-5 login-box-msg">Reseteo de contraseña</p>

        <form method="post" id="frmForm" data-url="{{ list_url }}" autocomplete="off">
            {% csrf_token %}
            <div class="form-group mb-5">
                <label class="fb-label">{{ form.username.label }}</label>
                <div class="fb-input-wrapper">
                    <span class="fb-input-icon"><i class="fas fa-user"></i></span>
                    {{ form.username }}
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block w-full py-2.5 font-semibold">
                <i class="fas fa-paper-plane mr-2"></i> Enviar
            </button>
        </form>

        <p class="text-center text-sm mt-4 text-gray-400 login-box-msg desc">
            Volver al login
            <a href="{{ list_url }}" class="text-indigo-600 font-medium hover:underline">
                click aquí <i class="fas fa-user"></i>
            </a>
        </p>
    </div>
</div>
{% endblock %}
